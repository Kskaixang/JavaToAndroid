name: Build and Deploy to Oracle Cloud

on:
  push:
    branches:
      - master # 當 master 分支有 push 時觸發

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 1. 進入子資料夾 SpringToAndroid 編譯 JAR 檔
      - name: Build with Maven
        run: |
          chmod +x ./mvnw
          ./mvnw clean package -DskipTests
        working-directory: SpringToAndroid

      # 2. 登入 Docker Hub (使用寫死的帳號 ks995)
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ks995
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }} # 這是敏感 Token，必須用 GitHub 保險箱

      # 3. 指定在 SpringToAndroid 資料夾內打包 Docker 映像檔
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./SpringToAndroid
          file: ./SpringToAndroid/Dockerfile
          push: true
          tags: ks995/springtoandroid:latest # 已寫死您的 Docker 映像檔名稱

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 4. 複製子資料夾內的 docker-compose.yml 到 Oracle，並去掉資料夾前綴
      - name: Copy docker-compose.yml to Oracle
        uses: appleboy/scp-action@master
        with:
          host: 161.33.157.67 # 已寫死您的 Oracle IP
          username: opc
          key: ${{ secrets.ORACLE_SSH_KEY }} # 這是連線金鑰，必須用 GitHub 保險箱
          port: 22
          source: "SpringToAndroid/docker-compose.yml"
          target: "/home/opc/app"
          strip_components: 1 # 去除 SpringToAndroid/ 前綴，讓檔案直接存為 /home/opc/app/docker-compose.yml

      # 5. SSH 連線進 Oracle 自動安裝 Docker 並啟動服務
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 161.33.157.67 # 已寫死您的 Oracle IP
          username: opc
          key: ${{ secrets.ORACLE_SSH_KEY }} # 這是連線金鑰，必須用 GitHub 保險箱
          port: 22
          script: |
            # 1. 檢查並設定 Swap 虛擬記憶體 (1GB 主機必做，防止記憶體不足被系統殺除)
            if [ ! -f /swapfile ]; then
              echo "Creating 4GB Swap file..."
              sudo dd if=/dev/zero of=/swapfile bs=1M count=4096
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
              echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
            fi

            # 2. 檢查並清除 DNF 鎖定，防止背景自動更新卡死安裝
            if [ -f /var/run/dnf.pid ]; then
              echo "DNF is locked by process $(cat /var/run/dnf.pid). Clearing lock..."
              sudo kill -9 $(cat /var/run/dnf.pid) 2>/dev/null || true
              sudo rm -f /var/run/dnf.pid
            fi

            # 3. 檢查是否已安裝 Docker，若無則自動安裝
            if ! command -v docker &> /dev/null; then
              echo "Docker not found. Installing..."
              sudo dnf config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
              sudo dnf install -y --allowerasing docker-ce docker-ce-cli containerd.io docker-compose-plugin
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker opc
            fi
            
            # 4. 建立資料夾並進入
            mkdir -p /home/opc/app
            cd /home/opc/app
            
            # 5. 批取最新映像檔並重啟 (使用 sudo 確保 100% 權限成功)
            sudo docker compose pull
            sudo docker compose up -d