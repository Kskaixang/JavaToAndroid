name: Build and Deploy to Oracle Cloud

on:
  push:
    branches:
      - master # 當 master 分支有 push 時觸發

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 1. 進入子資料夾 SpringToAndroid 編譯 JAR 檔
      - name: Build with Maven
        run: |
          chmod +x ./mvnw
          ./mvnw clean package -DskipTests
        working-directory: SpringToAndroid

      # 2. 登入 Docker Hub (使用寫死的帳號 ks995)
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ks995
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }} # 這是敏感 Token，必須用 GitHub 保險箱

      # 3. 指定在 SpringToAndroid 資料夾內打包 Docker 映像檔
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./SpringToAndroid
          file: ./SpringToAndroid/Dockerfile
          push: true
          tags: ks995/springtoandroid:latest # 已寫死您的 Docker 映像檔名稱

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 4. 複製子資料夾內的 docker-compose.yml 到 Oracle，並去掉資料夾前綴
      - name: Copy docker-compose.yml to Oracle
        uses: appleboy/scp-action@master
        with:
          host: 161.33.157.67 # 已寫死您的 Oracle IP
          username: opc
          key: ${{ secrets.ORACLE_SSH_KEY }} # 這是連線金鑰，必須用 GitHub 保險箱
          port: 22
          source: "SpringToAndroid/docker-compose.yml"
          target: "/home/opc/app"
          strip_components: 1 # 去除 SpringToAndroid/ 前綴，讓檔案直接存為 /home/opc/app/docker-compose.yml

      # 5. SSH 連線進 Oracle 啟動 Docker
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 161.33.157.67 # 已寫死您的 Oracle IP
          username: opc
          key: ${{ secrets.ORACLE_SSH_KEY }} # 這是連線金鑰，必須用 GitHub 保險箱
          port: 22
          script: |
            mkdir -p /home/opc/app
            cd /home/opc/app
            docker compose pull
            docker compose up -d