spring.application.name=SpringToAndroid

# ===================================================================
# ⚠️ 【開發者注意】本機直連雲端 Oracle 資料庫必讀指南
# ===================================================================
# 為了最高安全性，雲端資料庫(3306) 並沒有對外開放公網直連。
# 我們已在此專案中實作自動化 SSH 通道：
# Spring Boot 啟動時會自動在背景啟動 SSH，結束時會自動關閉，開發者「完全不需要手動操作」。
#
# 下方的 localhost:3307 會自動被導向雲端！
# ===================================================================
context.initializer.classes=com.example.springtoandroid.config.SshTunnelInitializer
spring.datasource.url=jdbc:mysql://localhost:3307/springtoandroid?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Taipei
spring.datasource.username=root
# 本機開發時，必須在系統環境變數或 IDE 中設定 DB_PASSWORD
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. JPA / Hibernate 自動建表設定
# update 代表啟動時會自動比對 Entity 類別並在資料庫中自動建立/修改資料表結構
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# JWT & OAuth2 (Google)
# ===================================================================
# JWT 密鑰 (正式環境透過環境變數注入，本地開發若沒設變數則使用後方預設值)
jwt.secret=${JWT_SECRET:mySuperSecretKeyForJwtAuthenticationWhichShouldBeLongEnough}
# JWT 預設過期時間 (毫秒)，這裡設定為 24 小時
jwt.expirationMs=86400000

# Google Web Client ID
# (注意：Client ID 本來就是公開的識別碼，直接寫死在這裡並推上 Git 是完全安全且合法的)
google.client.id=548583807532-061572fv916urkah6a039aalcrjf5f06.apps.googleusercontent.com
