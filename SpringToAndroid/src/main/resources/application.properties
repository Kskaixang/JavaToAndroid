spring.application.name=SpringToAndroid

# 1. 本地開發資料庫配置 (預設連線本地 MySQL)
# 加上 createDatabaseIfNotExist=true 參數，當本地沒有該資料庫時會自動為您創建
spring.datasource.url=jdbc:mysql://localhost:3306/springtoandroid?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Taipei
spring.datasource.username=root
# 請在此處填寫您本地 MySQL 的密碼
spring.datasource.password=rootpassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. JPA / Hibernate 自動建表設定
# update 代表啟動時會自動比對 Entity 類別並在資料庫中自動建立/修改資料表結構
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
